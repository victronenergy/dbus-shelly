name: Makefile CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.12]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev libglib2.0-dev dbus dbus-x11
        python -m pip install --upgrade pip
        pip install dbus-python dbus_fast aioshelly websockets zeroconf async_timeout s2_python==0.8.1

    - name: Run install test
      run: make testinstall
